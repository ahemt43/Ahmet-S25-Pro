name: S25 Pro Yeni Nesil Fabrika
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Yeni Nesil Motoru Topla
        run: |
          flutter create ahmet_s25_pro
          cp main.dart ahmet_s25_pro/lib/main.dart
          cd ahmet_s25_pro
          
          # Yeni nesil, hatasız modifiye parçaları
          flutter pub add flutter_blue_plus webview_flutter path_provider permission_handler
          
          # S25 FE için gerekli Android 12+ Bluetooth izinlerini kablo tesisatına otomatik ekliyoruz
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" \/>\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" \/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>/g' android/app/src/main/AndroidManifest.xml
          
          # Motoru topla ve APK'yı bas
          flutter build apk --release
          
      - name: APK'yi Teslim Et
        uses: actions/upload-artifact@v4
        with:
          name: Ahmet-S25-Pro-YeniNesil
          path: ahmet_s25_pro/build/app/outputs/flutter-apk/app-release.apk
